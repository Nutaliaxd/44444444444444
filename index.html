<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TADC Türkiye Dağıtım Kampanyası</title>
<style>
  :root {
    --bg:#f7f8fa; --card:#fff; --border:#e3e5e8;
    --text:#1f2328; --muted:#6b7280;
    --accent:#1a73e8; --accent-hover:#1558b0;
    --success:#0f9d58; --success-bg:#e7f5ee;
    --warn:#b45309; --warn-bg:#fff4e0;
    --danger:#d93025; --danger-bg:#fde8e8;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;padding:32px 20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  .wrap{max-width:640px;margin:0 auto}
  h1{font-size:26px;margin:0 0 8px;line-height:1.3}
  .desc{color:var(--muted);font-size:14px;line-height:1.5;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center}
  .count{font-size:40px;font-weight:600;margin-bottom:4px}
  .count-label{color:var(--muted);font-size:13px;margin-bottom:20px}

  .step{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;text-align:left}
  .step.done{background:var(--success-bg);border-color:#b6e0c4}
  .step.active{background:#eef4ff;border-color:#b6cdf5}
  .step-num{flex:0 0 28px;width:28px;height:28px;border-radius:50%;background:#e3e5e8;color:#555;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
  .step.done .step-num{background:var(--success);color:#fff}
  .step.active .step-num{background:var(--accent);color:#fff}
  .step-body{flex:1;font-size:13px}
  .step-body b{display:block;margin-bottom:2px;font-size:14px}
  .step-body .sub{color:var(--muted);font-size:12px}

  button.btn{display:inline-block;border:none;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
  button.primary{background:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent-hover)}
  button:disabled{background:#c5c9d0 !important;color:#fff !important;cursor:not-allowed;border-color:transparent !important}

  .big-btn{display:inline-block;background:var(--accent);color:#fff;border:none;padding:14px 32px;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:background .15s;margin-top:8px}
  .big-btn:hover{background:var(--accent-hover)}
  .big-btn:disabled{background:#c5c9d0 !important;color:#fff !important;cursor:not-allowed}
  .retry-btn{display:inline-block;background:var(--warn);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-top:10px}
  .retry-btn:hover{opacity:.9}

  .warn{background:var(--warn-bg);border:1px solid #ffd591;color:var(--warn);padding:10px 12px;border-radius:6px;font-size:12px;text-align:left;margin-top:10px;line-height:1.5}
  .err{background:var(--danger-bg);border:1px solid #f5c2c2;color:var(--danger);padding:12px;border-radius:6px;font-size:13px;text-align:left;margin-top:12px}

  .list{margin-top:16px;text-align:left;border-top:1px solid var(--border)}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;border-bottom:1px solid var(--border);font-size:13px}
  .row .who small{color:var(--muted);display:block;font-size:11px}
  .row button{background:#fff;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
  .row button:hover{background:#f1f3f5}
  .row.done button{background:var(--success-bg);border-color:#b6e0c4;color:var(--success)}
  .row.blocked button{background:var(--warn-bg);border-color:#ffd591;color:var(--warn)}

  #status{margin-top:12px;font-size:13px;color:var(--muted);min-height:16px}
  #status.ok{color:var(--success);font-weight:500}
  #status.bad{color:var(--warn);font-weight:500}
  details{margin-top:16px}
  summary{color:var(--muted);font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">Mail Gönderimi</h1>
  <p class="desc" id="desc"></p>

  <div class="card">
    <div class="count" id="count">0</div>
    <div class="count-label">hazır mail</div>

    <div class="step active" id="step1">
      <div class="step-num">1</div>
      <div class="step-body">
        <b>Pop-up iznini ver</b>
        <div class="sub">Tarayıcı varsayılan olarak çoklu sekme açılmasını engeller.</div>
      </div>
      <button id="permBtn" class="btn primary">Test et</button>
    </div>

    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-body">
        <b>Mailleri aç</b>
        <div class="sub">Her alıcı için Gmail'de ayrı taslak açılır. İmza bölümünü düzenlemeyi unutma.</div>
      </div>
    </div>

    <div id="permHelp" style="display:none"></div>

    <button id="openAll" class="big-btn" disabled>Tüm Mailleri Aç</button>
    <div><button id="retryBlocked" class="retry-btn" style="display:none">Engellenenleri Tekrar Aç</button></div>

    <details>
      <summary>Listeyi göster / tek tek aç</summary>
      <div class="list" id="list"></div>
    </details>

    <div id="status"></div>
  </div>
</div>

<!-- ============================================================
     DÜZENLENECEK TEK KISIM — alıcılar ve mesaj aşağıda
     ============================================================ -->
<script>
const CAMPAIGN = {
  title: "TADC: The Last Act — Türkiye Dağıtım Talebi",

  description: "Aşağıdaki butona bastığınızda Türkiye'deki 10 film dağıtım şirketine aynı maili ayrı ayrı göndermek için Gmail'de 10 ayrı taslak açılır. Her sekmede mesajı kontrol edip 'Gönder'e basmanız yeterlidir. Göndermeden önce mailin sonundaki [isim/soyisim] ve [Mail Adresim] alanlarını kendi bilgilerinizle değiştirmeyi unutmayın.",

  subject: "Dağıtım Talebi: The Amazing Digital Circus: The Last Act — Türkiye'de Kanıtlanmış Hayran Kitlesi",

  body:
`Merhaba,

GLITCH Productions'ın yapımcılığını üstlendiği 'The Amazing Digital Circus: The Last Act' adlı animasyon filminin Türkiye dağıtımı hakkında görüşünüzü almak istiyorum.

Film, YouTube'da milyarlarca izlenmeye ulaşmış ve küresel ölçekte büyük bir hayran kitlesine sahip 'The Amazing Digital Circus' serisinin final filmi olarak Haziran 2026'da vizyona girecek. Yapımcılar resmi sitelerinde (digitalcircus.movie) henüz dağıtımcısı olmayan bölgelerdeki hayranlardan yerel sinemalara ulaşmalarını açıkça talep ediyor — Türkiye de bu bölgeler arasında.

Türkiye'de somut ve ölçülebilir bir talep olduğunu göstermek isterim:

• Change.org kampanyası: Kısa sürede 1830+ doğrulanmış imza topladı ve hızla büyüyor
https://www.change.org/p/the-amazing-digital-circus-9-b%C3%B6l%C3%BCm-t%C3%BCrkiye-sinemalar%C4%B1nda-da-yay%C4%B1nlans%C4%B1n

• Sosyal medya etkileşimi: Konuyla ilgili tek bir gönderi 35.000+ görüntülenme, 2.500+ etkileşim, 1000+ beğeni aldı
https://x.com/002Natale/status/2042868429200249079

• Serinin uluslararası başarısı: YouTube'da bölüm başına 300+ milyon izlenme; ürün satışları, cosplay topluluğu ve aktif Türk hayran tabanı mevcut

Bu veriler, filmin Türkiye sinemalarında sınırlı sayıda salonda bile güçlü bir gişe performansı sergileyebileceğini gösteriyor. Firmanızın dağıtım portföyüne uygun bulursanız, GLITCH Productions ile iletişim kurma süreciyle ilgili bilgi almaktan memnuniyet duyarım.

Görüşmek dileğiyle,
[isim/soyisim]
Mail Adresim: `,

  recipients: [
    { email: "tmefilms@tme.com.tr",    isim: "TME Films"        },
    { email: "info@marsfilm.net",      isim: "Mars Film"         },
    { email: "info@bgfilmcilik.com",   isim: "BG Film"           },
    { email: "info@birfilm.com",       isim: "Bir Film"          },
    { email: "info@baskasinema.com",   isim: "Başka Sinema"      },
    { email: "info@cjenm.com",         isim: "CJ ENM"            },
    { email: "info@uip.com.tr",        isim: "UIP Türkiye"       },
    { email: "info@ozenfilm.com.tr",   isim: "Özen Film"         },
    { email: "info@a90pictures.com",   isim: "A90 Pictures"      },
    { email: "info@kurmacafilm.com",   isim: "Kurmaca Film"      }
  ]
};
</script>

<!-- ============================================================
     Aşağısına DOKUNMA — mantık burada
     ============================================================ -->
<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const render = (tpl, vars) => (tpl || '').replace(/\{([\w-]+)\}/g, (_, k) => (vars[k] ?? ''));
  const isEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e || '');
  const composeUrl = (to, su, body) =>
    'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(to) +
    '&su=' + encodeURIComponent(su) + '&body=' + encodeURIComponent(body);
  const esc = (s) => (s ?? '').toString().replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function showError(msg) {
    const el = document.createElement('div');
    el.className = 'err';
    el.innerHTML = '<b>Hata:</b> ' + esc(msg);
    document.querySelector('.card').appendChild(el);
  }

  if (typeof CAMPAIGN === 'undefined' || !CAMPAIGN) {
    showError('CAMPAIGN tanımlı değil.');
    return;
  }

  $('title').textContent = CAMPAIGN.title || 'Mail Gönderimi';
  $('desc').textContent  = CAMPAIGN.description || '';
  document.title = CAMPAIGN.title || document.title;

  const items = (CAMPAIGN.recipients || [])
    .filter(r => r && isEmail(r.email))
    .map((r, i) => ({
      idx: i, to: r.email, row: r,
      subject: render(CAMPAIGN.subject, r),
      body:    render(CAMPAIGN.body,    r),
      opened: false
    }));

  $('count').textContent = items.length;

  const list = $('list');
  items.forEach((it) => {
    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.i = it.idx;
    row.innerHTML =
      '<div class="who"><div>' + esc(it.row.isim || it.to) + '</div>' +
      '<small>' + esc(it.to) + '</small></div>' +
      '<button data-i="' + it.idx + '">Aç</button>';
    list.appendChild(row);
  });

  function markRow(idx, state) {
    const row = list.querySelector('.row[data-i="' + idx + '"]');
    if (!row) return;
    row.classList.remove('done', 'blocked');
    const btn = row.querySelector('button');
    if (state === 'opened') { row.classList.add('done'); btn.textContent = '✓ açıldı'; items[idx].opened = true; }
    else if (state === 'blocked') { row.classList.add('blocked'); btn.textContent = 'engellendi'; items[idx].opened = false; }
    else { btn.textContent = 'Aç'; items[idx].opened = false; }
  }

  list.querySelectorAll('button').forEach((b) => {
    b.addEventListener('click', () => {
      const idx = parseInt(b.dataset.i, 10);
      const it = items[idx];
      if (!it) return;
      const w = window.open(composeUrl(it.to, it.subject, it.body), '_blank');
      markRow(idx, (w && !w.closed) ? 'opened' : 'blocked');
    });
  });

  if (!items.length) {
    $('status').textContent = 'Listede geçerli alıcı yok. CAMPAIGN.recipients dizisini kontrol et.';
    $('permBtn').disabled = true;
    return;
  }

  const step1 = $('step1'), step2 = $('step2');
  const permBtn = $('permBtn');
  const permHelp = $('permHelp');
  const openAllBtn = $('openAll');
  const retryBtn = $('retryBlocked');
  let permissionGranted = false;

  function setPermGranted() {
    permissionGranted = true;
    step1.classList.remove('active');
    step1.classList.add('done');
    step2.classList.add('active');
    permBtn.textContent = '✓ İzin verildi';
    permBtn.disabled = true;
    openAllBtn.disabled = false;
    permHelp.style.display = 'none';
    permHelp.innerHTML = '';
  }

  function setPermBlocked() {
    permHelp.style.display = 'block';
    permHelp.className = 'warn';
    permHelp.innerHTML =
      '<b>Pop-up engellendi.</b><br>' +
      '• Adres çubuğunun sağ ucundaki küçük <b>engellenmiş pop-up ikonuna</b> tıkla.<br>' +
      '• Açılan menüden <b>"Her zaman ' + location.host + ' için izin ver"</b> seç.<br>' +
      '• Tamam\'a bas, sonra tekrar <b>Test et</b>.<br><br>' +
      '<b>Brave:</b> Sol üstteki aslan ikonu → <b>Shields DOWN</b>.';
  }

  permBtn.addEventListener('click', () => {
    const test = window.open('about:blank', 'mail_launcher_test', 'width=200,height=100');
    if (!test || test.closed || typeof test.closed === 'undefined') {
      setPermBlocked();
      return;
    }
    setTimeout(() => { try { test.close(); } catch(e) {} }, 200);
    setPermGranted();
  });

  function openBatch(targets) {
    $('status').className = '';
    $('status').textContent = 'Açılıyor... (0/' + targets.length + ')';
    let opened = 0, blocked = 0, done = 0;

    targets.forEach((it, i) => {
      setTimeout(() => {
        const w = window.open(composeUrl(it.to, it.subject, it.body), '_blank');
        if (w && !w.closed) { markRow(it.idx, 'opened'); opened++; }
        else { markRow(it.idx, 'blocked'); blocked++; }
        done++;
        $('status').textContent = 'Açılıyor... (' + done + '/' + targets.length + ')';

        if (done === targets.length) {
          const blockedItems = items.filter(x => !x.opened);
          if (blockedItems.length === 0) {
            $('status').className = 'ok';
            $('status').textContent = '✓ Tüm sekmeler açıldı (' + opened + '/' + items.length + '). Her birinde "Gönder"e bas.';
            retryBtn.style.display = 'none';
          } else {
            $('status').className = 'bad';
            $('status').textContent = opened + '/' + items.length + ' açıldı · ' + blockedItems.length + ' engellendi. Tarayıcı pop-up iznini kısıtlamış olabilir.';
            retryBtn.style.display = 'inline-block';
            retryBtn.textContent = 'Engellenen ' + blockedItems.length + ' sekmeyi tekrar aç';
          }
        }
      }, i * 300);
    });
  }

  openAllBtn.addEventListener('click', () => {
    if (!permissionGranted) return;
    retryBtn.style.display = 'none';
    items.forEach(it => markRow(it.idx, 'reset'));
    openBatch(items);
  });

  retryBtn.addEventListener('click', () => {
    const blockedItems = items.filter(x => !x.opened);
    if (!blockedItems.length) { retryBtn.style.display = 'none'; return; }
    openBatch(blockedItems);
  });
})();
</script>
</body>
</html>
